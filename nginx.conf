resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Upstream variables for dynamic resolution
map $uri $upstream_target { default ""; }

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml application/javascript
               application/json image/svg+xml application/wasm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Proxy Routes ──

    # OpenSky Network
    location /api/opensky/ {
        set $upstream_opensky "https://opensky-network.org";
        proxy_pass $upstream_opensky/api/;
        proxy_set_header Host opensky-network.org;
        proxy_ssl_server_name on;
    }

    # ADSB.lol military flights
    location /api/adsb/ {
        set $upstream_adsb "https://api.adsb.lol";
        proxy_pass $upstream_adsb/;
        proxy_set_header Host api.adsb.lol;
        proxy_ssl_server_name on;
    }

    # CelesTrak satellite TLEs
    location /api/celestrak/ {
        set $upstream_celestrak "https://celestrak.org";
        proxy_pass $upstream_celestrak/;
        proxy_set_header Host celestrak.org;
        proxy_ssl_server_name on;
    }

    # USGS earthquakes
    location /api/usgs/ {
        set $upstream_usgs "https://earthquake.usgs.gov";
        proxy_pass $upstream_usgs/;
        proxy_set_header Host earthquake.usgs.gov;
        proxy_ssl_server_name on;
    }

    # Austin TX open data
    location /api/austin/ {
        set $upstream_austin "https://data.austintexas.gov";
        proxy_pass $upstream_austin/;
        proxy_set_header Host data.austintexas.gov;
        proxy_ssl_server_name on;
    }

    # Overpass API (OpenStreetMap)
    location /api/overpass/ {
        set $upstream_overpass "https://overpass-api.de";
        proxy_pass $upstream_overpass/;
        proxy_set_header Host overpass-api.de;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
    }

    # Austin CCTV images
    location /api/cctv-img/ {
        set $upstream_cctv "https://cctv.austinmobility.io";
        proxy_pass $upstream_cctv/;
        proxy_set_header Host cctv.austinmobility.io;
        proxy_ssl_server_name on;
    }

    # Caltrans CCTV data
    location /api/caltrans/ {
        set $upstream_caltrans "https://cwwp2.dot.ca.gov";
        proxy_pass $upstream_caltrans/;
        proxy_set_header Host cwwp2.dot.ca.gov;
        proxy_ssl_server_name on;
        proxy_read_timeout 30s;
    }

    # Caltrans CCTV images
    location /api/caltrans-img/ {
        set $upstream_caltrans_img "https://cwwp2.dot.ca.gov";
        proxy_pass $upstream_caltrans_img/;
        proxy_set_header Host cwwp2.dot.ca.gov;
        proxy_ssl_server_name on;
    }

    # CartoDB dark map tiles
    location /api/carto-tiles/ {
        set $upstream_carto "https://basemaps.cartocdn.com";
        proxy_pass $upstream_carto/;
        proxy_set_header Host basemaps.cartocdn.com;
        proxy_ssl_server_name on;
        proxy_cache_valid 200 7d;
        expires 7d;
    }

    # OpenStreetMap tiles
    location /api/osm-tiles/ {
        set $upstream_osm "https://tile.openstreetmap.org";
        proxy_pass $upstream_osm/;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_ssl_server_name on;
        proxy_cache_valid 200 7d;
        expires 7d;
    }

    # Google 3D Tiles
    location /api/google-tiles/ {
        set $upstream_google "https://tile.googleapis.com";
        proxy_pass $upstream_google/;
        proxy_set_header Host tile.googleapis.com;
        proxy_ssl_server_name on;
    }

    # Cesium Ion API
    location /api/cesium-ion/ {
        set $upstream_cesium_ion "https://api.cesium.com";
        proxy_pass $upstream_cesium_ion/;
        proxy_set_header Host api.cesium.com;
        proxy_ssl_server_name on;
    }

    # Cesium Ion assets
    location /api/cesium-assets/ {
        set $upstream_cesium_assets "https://assets.cesium.com";
        proxy_pass $upstream_cesium_assets/;
        proxy_set_header Host assets.cesium.com;
        proxy_ssl_server_name on;
    }

    # ── Static Assets ──

    # Hashed Vite assets — immutable cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cesium workers and assets
    location /cesium/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # POI images, logos, fonts
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # WASM files
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
        expires 7d;
        try_files $uri =404;
    }

    # ── SPA Fallback ──

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
