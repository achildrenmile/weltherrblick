<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Solar panel left -->
  <rect x="1" y="10" width="8" height="12" rx="1" fill="#4488ff" opacity="0.9" stroke="#66aaff" stroke-width="0.5"/>
  <line x1="3" y1="10" x2="3" y2="22" stroke="#66aaff" stroke-width="0.3" opacity="0.6"/>
  <line x1="5" y1="10" x2="5" y2="22" stroke="#66aaff" stroke-width="0.3" opacity="0.6"/>
  <line x1="7" y1="10" x2="7" y2="22" stroke="#66aaff" stroke-width="0.3" opacity="0.6"/>
  <!-- Body -->
  <rect x="10" y="12" width="12" height="8" rx="2" fill="#cccccc" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="2" fill="#ff4444" opacity="0.8"/>
  <!-- Antenna -->
  <line x1="16" y1="8" x2="16" y2="12" stroke="#ffffff" stroke-width="0.8"/>
  <circle cx="16" cy="7" r="1.5" fill="none" stroke="#ffffff" stroke-width="0.6"/>
  <!-- Solar panel right -->
  <rect x="23" y="10" width="8" height="12" rx="1" fill="#4488ff" opacity="0.9" stroke="#66aaff" stroke-width="0.5"/>
  <line x1="25" y1="10" x2="25" y2="22" stroke="#66aaff" stroke-width="0.3" opacity="0.6"/>
  <line x1="27" y1="10" x2="27" y2="22" stroke="#66aaff" stroke-width="0.3" opacity="0.6"/>
  <line x1="29" y1="10" x2="29" y2="22" stroke="#66aaff" stroke-width="0.3" opacity="0.6"/>
</svg>
