<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="160" fill="transparent"/>
  <ellipse cx="100" cy="90" rx="90" ry="60" fill="url(#glow)"/>

  <!-- Mini globe in center -->
  <circle cx="100" cy="85" r="22" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="100" cy="85" rx="22" ry="8" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="100" cy="85" rx="8" ry="22" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
  <path d="M78 85 Q89 75 100 78 Q111 75 122 85" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
  <path d="M78 85 Q89 95 100 92 Q111 95 122 85" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
  <!-- Crosshair on globe -->
  <line x1="95" y1="85" x2="105" y2="85" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
  <line x1="100" y1="80" x2="100" y2="90" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>

  <!-- === LEFT MOUSE (Brain) - big head, small body, scheming === -->
  <!-- Body -->
  <ellipse cx="55" cy="115" rx="10" ry="14" fill="#ccbbaa" opacity="0.9"/>
  <!-- Big head / cranium -->
  <ellipse cx="55" cy="82" rx="18" ry="22" fill="#ddccbb" opacity="0.9"/>
  <!-- Brain bumps on top -->
  <ellipse cx="48" cy="64" rx="8" ry="6" fill="#ddccbb" opacity="0.9"/>
  <ellipse cx="62" cy="64" rx="8" ry="6" fill="#ddccbb" opacity="0.9"/>
  <ellipse cx="55" cy="61" rx="6" ry="5" fill="#ddccbb" opacity="0.9"/>
  <!-- Brain lines -->
  <path d="M45 68 Q50 72 55 68 Q60 72 65 68" fill="none" stroke="#aa9988" stroke-width="0.8" opacity="0.5"/>
  <path d="M48 63 Q53 66 58 63" fill="none" stroke="#aa9988" stroke-width="0.6" opacity="0.4"/>
  <!-- Face -->
  <ellipse cx="55" cy="92" rx="10" ry="8" fill="#eeddcc" opacity="0.8"/>
  <!-- Eyes - narrow, scheming -->
  <ellipse cx="49" cy="86" rx="3.5" ry="2" fill="white"/>
  <ellipse cx="61" cy="86" rx="3.5" ry="2" fill="white"/>
  <ellipse cx="50" cy="86" rx="1.5" ry="1.8" fill="#111"/>
  <ellipse cx="62" cy="86" rx="1.5" ry="1.8" fill="#111"/>
  <!-- Eyebrows - angry/scheming -->
  <line x1="45" y1="83" x2="52" y2="84" stroke="#665544" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="65" y1="83" x2="58" y2="84" stroke="#665544" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="55" cy="91" rx="2.5" ry="2" fill="#ffaaaa" opacity="0.7"/>
  <!-- Scheming smirk -->
  <path d="M50 95 Q55 99 60 95" fill="none" stroke="#665544" stroke-width="1" stroke-linecap="round"/>
  <!-- Big round ears -->
  <ellipse cx="36" cy="78" rx="8" ry="9" fill="#eeddcc" stroke="#ddccbb" stroke-width="0.5"/>
  <ellipse cx="36" cy="78" rx="5" ry="6" fill="#ffccbb" opacity="0.5"/>
  <ellipse cx="74" cy="78" rx="8" ry="9" fill="#eeddcc" stroke="#ddccbb" stroke-width="0.5"/>
  <ellipse cx="74" cy="78" rx="5" ry="6" fill="#ffccbb" opacity="0.5"/>
  <!-- Arms reaching toward globe -->
  <path d="M63 110 Q72 100 78 87" fill="none" stroke="#ccbbaa" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="78" cy="86" r="3" fill="#ddccbb"/>
  <!-- Fingers grabbing -->
  <line x1="78" y1="84" x2="80" y2="82" stroke="#ddccbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="79" y1="86" x2="82" y2="85" stroke="#ddccbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="78" y1="88" x2="81" y2="88" stroke="#ddccbb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M50 128 Q40 140 30 138 Q25 136 28 132" fill="none" stroke="#ccbbaa" stroke-width="2" stroke-linecap="round"/>
  <!-- Tiny legs -->
  <ellipse cx="50" cy="130" rx="4" ry="3" fill="#ccbbaa"/>
  <ellipse cx="60" cy="130" rx="4" ry="3" fill="#ccbbaa"/>

  <!-- === RIGHT MOUSE (Pinky) - tall, goofy, tongue out === -->
  <!-- Body - taller, thinner -->
  <ellipse cx="145" cy="112" rx="9" ry="16" fill="#ccbbaa" opacity="0.9"/>
  <!-- Head - smaller, rounder -->
  <circle cx="145" cy="82" r="14" fill="#ddccbb" opacity="0.9"/>
  <!-- Face -->
  <ellipse cx="145" cy="88" rx="8" ry="6" fill="#eeddcc" opacity="0.8"/>
  <!-- Eyes - big, dopey, looking different directions -->
  <circle cx="140" cy="82" r="4" fill="white"/>
  <circle cx="150" cy="82" r="4" fill="white"/>
  <circle cx="141" cy="83" r="2" fill="#4488ff"/>
  <circle cx="152" cy="81" r="2" fill="#4488ff"/>
  <circle cx="141.5" cy="83.5" r="0.8" fill="#111"/>
  <circle cx="152.5" cy="81.5" r="0.8" fill="#111"/>
  <!-- Happy eyebrows -->
  <path d="M136 78 Q140 76 143 78" fill="none" stroke="#665544" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M147 78 Q150 76 154 78" fill="none" stroke="#665544" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="145" cy="87" rx="2.5" ry="2" fill="#ffaaaa" opacity="0.7"/>
  <!-- Big goofy smile -->
  <path d="M138 91 Q142 97 145 97 Q148 97 152 91" fill="none" stroke="#665544" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tongue sticking out -->
  <ellipse cx="145" cy="97" rx="3" ry="3.5" fill="#ff7777" opacity="0.7"/>
  <!-- Buck teeth -->
  <rect x="143" y="92" width="2" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="146" y="92" width="2" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Big floppy ears -->
  <ellipse cx="128" cy="76" rx="9" ry="10" fill="#eeddcc" stroke="#ddccbb" stroke-width="0.5"/>
  <ellipse cx="128" cy="76" rx="6" ry="7" fill="#ffccbb" opacity="0.5"/>
  <ellipse cx="162" cy="76" rx="9" ry="10" fill="#eeddcc" stroke="#ddccbb" stroke-width="0.5"/>
  <ellipse cx="162" cy="76" rx="6" ry="7" fill="#ffccbb" opacity="0.5"/>
  <!-- Arm pointing at globe, confused -->
  <path d="M137 105 Q128 95 122 88" fill="none" stroke="#ccbbaa" stroke-width="3" stroke-linecap="round"/>
  <circle cx="122" cy="87" r="2.5" fill="#ddccbb"/>
  <!-- Pointing finger -->
  <line x1="122" y1="86" x2="119" y2="85" stroke="#ddccbb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tail - longer, curly -->
  <path d="M150 128 Q160 142 168 138 Q174 134 170 128 Q166 122 172 118" fill="none" stroke="#ccbbaa" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Tiny legs -->
  <ellipse cx="140" cy="129" rx="4" ry="3" fill="#ccbbaa"/>
  <ellipse cx="150" cy="129" rx="4" ry="3" fill="#ccbbaa"/>

  <!-- Speech bubble from Brain -->
  <path d="M38 55 L38 38 L95 38 L95 55 L50 55 L45 60 L48 55 Z" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.7"/>
  <text x="66" y="49" text-anchor="middle" font-family="monospace" font-size="8" fill="#00ff41" opacity="0.9">TAKE OVER</text>
  <text x="66" y="42" text-anchor="middle" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.6">TONIGHT WE</text>

  <!-- Speech bubble from Pinky -->
  <path d="M125 55 L125 38 L175 38 L175 55 L140 55 L137 60 L139 55 Z" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.7"/>
  <text x="150" y="49" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.9">NARF!</text>

  <!-- HUD corner brackets -->
  <path d="M5 5 L5 20 M5 5 L20 5" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <path d="M195 5 L195 20 M195 5 L180 5" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <path d="M5 155 L5 140 M5 155 L20 155" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <path d="M195 155 L195 140 M195 155 L180 155" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>

  <!-- Bottom status text -->
  <text x="100" y="152" text-anchor="middle" font-family="monospace" font-size="5" fill="#00ff41" opacity="0.4">WELTHERRBLICK // WORLD DOMINATION INTERFACE</text>
</svg>
